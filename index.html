<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBGT 4-Sided Panorama Slide</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');

        :root {
            --safe-bg: #0070C0;
            --caution-bg: #00B050;
            --warning-bg: #FFC000;
            --severe-bg: #FF6600;
            --danger-bg: #FF0000;
            --text-color: #ffffff;
            --p-size: 128px;
        }

        /* xy 0.0 固定設定 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            /* 4面分の領域を確保 */
            width: 512px;
            height: 128px;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 全体を表示するコンテナ */
        .viewport {
            width: 512px;
            height: 128px;
            overflow: hidden;
        }

        /* 8枚のパネルを並べて無限ループ（4面 + 4面コピー） */
        .cube-strip {
            display: flex;
            width: calc(var(--p-size) * 8);
            height: var(--p-size);
            /* 3秒ごとに1面分(128px)ずつ左へシフト */
            animation: panoramaScroll 12s infinite steps(1, end);
        }

        .panel {
            flex-shrink: 0;
            width: var(--p-size);
            height: var(--p-size);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 8px;
            color: var(--text-color);
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        /* PDFデザイン再現 */
        .temp-range { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
        .wbgt-val { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .status-label { font-size: 22px; font-weight: 900; line-height: 1.1; margin: 4px 0; letter-spacing: -1px; }
        .advice { 
            font-size: 9px; 
            font-weight: 700; 
            margin-top: 6px; 
            border-top: 1px solid rgba(255,255,255,0.6); 
            padding-top: 4px; 
            width: 100%;
        }

        /* スタイルクラス */
        .bg-safe { background-color: var(--safe-bg); }
        .bg-caution { background-color: var(--caution-bg); }
        .bg-warning { background-color: var(--warning-bg); }
        .bg-severe { background-color: var(--severe-bg); }
        .bg-danger { background-color: var(--danger-bg); }

        /* 左へ左へズレていくアニメーション */
        @keyframes panoramaScroll {
            0%   { transform: translateX(0); }             /* [日][英][越][中] */
            25%  { transform: translateX(-128px); }       /* [英][越][中][日(コ)] */
            50%  { transform: translateX(-256px); }       /* [越][中][日(コ)][英(コ)] */
            75%  { transform: translateX(-384px); }       /* [中][日(コ)][英(コ)][越(コ)] */
            100% { transform: translateX(-512px); }       /* 瞬時に 0% へリセット */
        }
    </style>
</head>
<body>

<div class="viewport">
    <div class="cube-strip" id="strip">
        <div class="panel" data-lang="jp"></div>
        <div class="panel" data-lang="en"></div>
        <div class="panel" data-lang="vi"></div>
        <div class="panel" data-lang="zh"></div>
        <div class="panel" data-lang="jp"></div>
        <div class="panel" data-lang="en"></div>
        <div class="panel" data-lang="vi"></div>
        <div class="panel" data-lang="zh"></div>
    </div>
</div>

<script>
    function updateSignage(val) {
        let level = '';
        let content = {};

        // PDFのデータセット
        if (val < 21) {
            level = 'bg-safe';
            content = {
                jp: ["24℃未満", "21未満", "ほぼ安全", "適宜水分補給"],
                en: ["Below 24℃", "Below 21", "Safe", "Stay hydrated"],
                vi: ["Dưới 24℃", "Dưới 21", "An toàn", "Bổ sung nước"],
                zh: ["24℃以下", "21以下", "基本安全", "注意补水"]
            };
        } else if (val < 25) {
            level = 'bg-caution';
            content = {
                jp: ["24~28℃", "21~25", "注意", "積極的に水分補給"],
                en: ["24~28℃", "21~25", "Caution", "Actively hydrate"],
                vi: ["24~28℃", "21~25", "Chú ý", "Uống nước thường xuyên"],
                zh: ["24~28℃", "21~25", "注意", "及时补水"]
            };
        } else if (val < 28) {
            level = 'bg-warning';
            content = {
                jp: ["28~31℃", "25~28", "警戒", "定期的に休憩"],
                en: ["28~31℃", "25~28", "Warning", "Take regular breaks"],
                vi: ["28~31℃", "25~28", "Cảnh báo", "Nghỉ ngơi định kỳ"],
                zh: ["28~31℃", "25~28", "警戒", "定时休息"]
            };
        } else if (val < 31) {
            level = 'bg-severe';
            content = {
                jp: ["31~35℃", "28~31", "厳重警戒", "激しい作業は中止"],
                en: ["31~35℃", "28~31", "Severe Warning", "Stop intense work"],
                vi: ["31~35℃", "28~31", "Cảnh báo nghiêm trọng", "Ngừng làm việc nặng"],
                zh: ["31~35℃", "28~31", "严重警戒", "停止剧烈作业"]
            };
        } else {
            level = 'bg-danger';
            content = {
                jp: ["35℃以上", "31以上", "危険", "作業を直ちに中止"],
                en: ["Above 35℃", "Above 31", "Danger", "Stop work immediately"],
                vi: ["Trên 35℃", "Trên 31", "Nguy hiểm", "Dừng công việc ngay"],
                zh: ["35℃以上", "31以上", "危险", "立即停止作業"]
            };
        }

        const panels = document.querySelectorAll('.panel');
        panels.forEach(p => {
            const lang = p.getAttribute('data-lang');
            const data = content[lang];
            p.className = 'panel ' + level;
            p.innerHTML = `
                <div class="temp-range">${data[0]}</div>
                <div class="wbgt-val">${data[1]}</div>
                <div class="status-label">${data[2]}</div>
                <div class="advice">${data[3]}</div>
            `;
        });
    }

    // 最新値 12.8（ほぼ安全）を反映
    updateSignage(12.8);
</script>

</body>
</html>
