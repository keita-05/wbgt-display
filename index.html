<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBGT 4-Sided Cube Signage</title>
    <style>
        /* PDFのフォントイメージを再現 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');

        :root {
            --bg-color: #0070C0; /* デフォルト：ほぼ安全（青） */
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 4面を横に並べたコンテナ (512x128) */
        .cube-container {
            display: flex;
            width: 512px;
            height: 128px;
            background-color: #000;
        }

        /* 各面 (128x128) */
        .panel {
            width: 128px;
            height: 128px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            padding: 5px;
            background-color: var(--bg-color);
            color: var(--text-color);
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        /* PDFのレイアウト・フォントサイズ再現 */
        .temp-range { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
        .wbgt-value { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .status-label { font-size: 22px; font-weight: 900; line-height: 1.1; margin: 4px 0; }
        .advice { font-size: 9px; font-weight: 700; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.5); padding-top: 4px; width: 90%; }

        /* 判定色 */
        .level-safe { --bg-color: #0070C0; }     /* ほぼ安全: 青 */
        .level-caution { --bg-color: #00B050; }  /* 注意: 緑 */
        .level-warning { --bg-color: #FFC000; }  /* 警戒: 黄 */
        .level-severe { --bg-color: #FF6600; }   /* 厳重警戒: 橙 */
        .level-danger { --bg-color: #FF0000; }   /* 危険: 赤 */

    </style>
</head>
<body>

<div class="cube-container" id="signage">
    <div class="panel" id="p1">
        <div class="temp-range" id="temp-jp">24℃未満</div>
        <div class="wbgt-value" id="val-jp">21未満</div>
        <div class="status-label" id="label-jp">ほぼ安全</div>
        <div class="advice" id="adv-jp">適宜水分補給</div>
    </div>

    <div class="panel" id="p2">
        <div class="temp-range" id="temp-en">Below 24℃</div>
        <div class="wbgt-value" id="val-en">Below 21</div>
        <div class="status-label" id="label-en">Safe</div>
        <div class="advice" id="adv-en">Stay hydrated</div>
    </div>

    <div class="panel" id="p3">
        <div class="temp-range" id="temp-vi">Dưới 24℃</div>
        <div class="wbgt-value" id="val-vi">Dưới 21</div>
        <div class="status-label" id="label-vi">An toàn</div>
        <div class="advice" id="adv-vi">Bổ sung nước</div>
    </div>

    <div class="panel" id="p4">
        <div class="temp-range" id="temp-zh">24℃以下</div>
        <div class="wbgt-value" id="val-zh">21以下</div>
        <div class="status-label" id="label-zh">基本安全</div>
        <div class="advice" id="adv-zh">注意补水</div>
    </div>
</div>

<script>
    // 現在の大阪(62078)の値：12.8 を想定した更新処理
    function updateWBGT(val) {
        const signage = document.getElementById('signage');
        let levelClass = '';
        let data = {};

        if (val < 21) {
            levelClass = 'level-safe';
            data = {
                jp: ["24℃未満", "21未満", "ほぼ安全", "適宜水分補給"],
                en: ["Below 24℃", "Below 21", "Safe", "Stay hydrated"],
                vi: ["Dưới 24℃", "Dưới 21", "An toàn", "Bổ sung nước"],
                zh: ["24℃以下", "21以下", "基本安全", "注意补水"]
            };
        } else if (val < 25) {
            levelClass = 'level-caution';
            data = {
                jp: ["24~28℃", "21~25", "注意", "積極的に水分補給"],
                en: ["24~28℃", "21~25", "Caution", "Actively hydrate"],
                vi: ["24~28℃", "21~25", "Chú ý", "Uống nước thường xuyên"],
                zh: ["24~28℃", "21~25", "注意", "及时补水"]
            };
        } else if (val < 28) {
            levelClass = 'level-warning';
            data = {
                jp: ["28~31℃", "25~28", "警戒", "定期的に休憩"],
                en: ["28~31℃", "25~28", "Warning", "Take regular breaks"],
                vi: ["28~31℃", "25~28", "Cảnh báo", "Nghỉ ngơi định kỳ"],
                zh: ["28~31℃", "25~28", "警戒", "定时休息"]
            };
        } else if (val < 31) {
            levelClass = 'level-severe';
            data = {
                jp: ["31~35℃", "28~31", "厳重警戒", "激しい作業は中止"],
                en: ["31~35℃", "28~31", "Severe Warning", "Stop intense work"],
                vi: ["31~35℃", "28~31", "Cảnh báo nghiêm trọng", "Ngừng làm việc nặng"],
                zh: ["31~35℃", "28~31", "严重警戒", "停止剧烈作业"]
            };
        } else {
            levelClass = 'level-danger';
            data = {
                jp: ["35℃以上", "31以上", "危険", "作業を直ちに中止"],
                en: ["Above 35℃", "Above 31", "Danger", "Stop work immediately"],
                vi: ["Trên 35℃", "Trên 31", "Nguy hiểm", "Dừng công việc ngay"],
                zh: ["35℃以上", "31以上", "危险", "立即停止作业"]
            };
        }

        // デザイン（背景色）の適用
        document.querySelectorAll('.panel').forEach(p => {
            p.className = 'panel ' + levelClass;
        });

        // テキストの流し込み（PDFの内容と全く一緒に更新）
        document.getElementById('temp-jp').innerText = data.jp[0];
        document.getElementById('val-jp').innerText = data.jp[1];
        document.getElementById('label-jp').innerText = data.jp[2];
        document.getElementById('adv-jp').innerText = data.jp[3];

        document.getElementById('temp-en').innerText = data.en[0];
        document.getElementById('val-en').innerText = data.en[1];
        document.getElementById('label-en').innerText = data.en[2];
        document.getElementById('adv-en').innerText = data.en[3];

        document.getElementById('temp-vi').innerText = data.vi[0];
        document.getElementById('val-vi').innerText = data.vi[1];
        document.getElementById('label-vi').innerText = data.vi[2];
        document.getElementById('adv-vi').innerText = data.vi[3];

        document.getElementById('temp-zh').innerText = data.zh[0];
        document.getElementById('val-zh').innerText = data.zh[1];
        document.getElementById('label-zh').innerText = data.zh[2];
        document.getElementById('adv-zh').innerText = data.zh[3];
    }

    // 最新値 12.8 を反映
    updateWBGT(12.8);
</script>

</body>
</html>
