<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGT LED Cube Display</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 512x128のメインコンテナ */
        .container { width: 512px; height: 128px; position: relative; overflow: hidden; }

        /* セットごとのグループ（4面分を1つにまとめる） */
        .set-group {
            display: none; width: 512px; height: 128px;
            flex-direction: row; position: absolute; top: 0; left: 0;
        }
        .active { display: flex !important; }

        /* 1面あたりのスタイル (128x128) */
        .panel {
            width: 128px; height: 128px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; box-sizing: border-box;
            border-right: 1px solid #333;
        }

        /* テキストスタイル */
        .label { font-size: 14px; color: #aaa; margin-bottom: 5px; }
        .val { font-size: 32px; font-weight: bold; color: #fff; line-height: 1.1; }
        .face { font-size: 60px; line-height: 1; }

        /* 3セット目：白背景パノラマ */
        .white-bg { background-color: #ffffff !important; border: none !important; }
        .ticker-container {
            width: 512px; height: 128px; background-color: #fff;
            display: flex; align-items: center; position: relative;
            overflow: hidden;
        }
        .ticker-text {
            white-space: nowrap; font-size: 36px; font-weight: bold; color: #000;
            position: absolute; padding-left: 100%;
            animation: ticker-anim 15s linear infinite;
        }
        @keyframes ticker-anim {
            0% { transform: translateX(0); }
            100% { transform: translateX(-200%); }
        }

        /* ほぼ安全の色 (青系) */
        .safe-color { color: #00b0f0 !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="set1" class="set-group active">
        <div class="panel"><div class="label" id="date1">04/13</div><div class="val" id="time1">00:00</div></div>
        <div class="panel"><div class="label">暑さ指数</div><div class="face">😊</div></div>
        <div class="panel"><div class="label">気温</div><div class="val">31℃</div></div>
        <div class="panel"><div class="label">湿度</div><div class="val">65%</div></div>
    </div>

    <div id="set2" class="set-group">
        <div class="panel"><div class="label" id="date2">04/13</div><div class="val" id="time2">00:00</div></div>
        <div class="panel"><div class="face">😊</div></div>
        <div class="panel"><div class="label" id="date3">04/13</div><div class="val" id="time3">00:00</div></div>
        <div class="panel"><div class="face">😊</div></div>
    </div>

    <div id="set3" class="set-group">
        <div class="ticker-container">
            <div class="ticker-text">
                【ほぼ安全】適宜水分補給をしてください 😊 気温：31℃ 湿度：65%
            </div>
        </div>
    </div>
</div>

<script>
    let currentSet = 1;

    function updateTime() {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                        now.getMinutes().toString().padStart(2, '0');
        const dateStr = (now.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                        now.getDate().toString().padStart(2, '0');

        for(let i=1; i<=3; i++) {
            if(document.getElementById('time'+i)) document.getElementById('time'+i).innerText = timeStr;
            if(document.getElementById('date'+i)) document.getElementById('date'+i).innerText = dateStr;
        }
    }

    function switchSet() {
        document.getElementById('set1').classList.remove('active');
        document.getElementById('set2').classList.remove('active');
        document.getElementById('set3').classList.remove('active');

        currentSet = (currentSet % 3) + 1;
        document.getElementById('set' + currentSet).classList.add('active');
    }

    setInterval(updateTime, 1000);
    setInterval(switchSet, 5000); // 5秒ごとにセット切り替え
    updateTime();
</script>

</body>
</html>
