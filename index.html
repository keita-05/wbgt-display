<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGT Multi-Language Signage - Final Edition</title>
    <style>
        /* Figmaデザイン・視認性重視の基本設定 */
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: "Inter", "Hiragino Kaku Gothic ProN", sans-serif; }
        .container { width: 512px; height: 128px; position: relative; overflow: hidden; }
        .set-group { display: none; width: 512px; height: 128px; flex-direction: row; position: absolute; top: 0; left: 0; }
        .active { display: flex !important; }
        
        /* パネル共通設定 */
        .panel { width: 128px; height: 128px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-sizing: border-box; border-right: 1px solid #333; }
        .label { font-size: 13px; font-weight: 500; color: #999; margin-bottom: 4px; letter-spacing: 0.05em; }
        
        /* デジタル時計：視認性最大化 */
        .time-val { font-size: 38px; font-weight: 800; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; }
        .sec-val { font-size: 18px; color: #ff4500; margin-left: 2px; font-weight: 700; }
        
        /* 気象数値 */
        .val { font-size: 34px; font-weight: 700; color: #fff; line-height: 1; }
        .unit { font-size: 16px; margin-left: 2px; font-weight: 400; }
        
        /* アイコンサイズ調整 */
        .face-svg { width: 95px; height: 95px; }
        .weather-svg { width: 80px; height: 80px; }

        /* ニュースティッカー（白背景・多言語対応） */
        .pan-content { width: 512px; height: 128px; background-color: #fff; display: flex; align-items: center; overflow: hidden; }
        .ticker-container { width: 100%; height: 128px; position: relative; display: flex; align-items: center; }
        .ticker-text { 
            white-space: nowrap; font-size: 28px; font-weight: 800; color: #000; 
            position: absolute; padding-left: 100%; display: flex; align-items: center;
            animation: ticker-anim 18s linear infinite; 
        }
        .ticker-face-icon { width: 44px; height: 44px; margin: 0 15px; }

        @keyframes ticker-anim { 0% { transform: translateX(0); } 100% { transform: translateX(-400%); } }

        /* レベル別カラー */
        .level-0 { color: #00b0f0 !important; } 
        .level-1, .level-2 { color: #ffff00 !important; } 
        .level-3 { color: #ff6600 !important; } 
        .level-4 { color: #ff0000 !important; }
    </style>
</head>
<body>

<svg style="display: none;">
    <symbol id="icon-sunny" viewBox="0 0 120 120"><circle cx="60" cy="60" r="24" fill="#ff4d00"/><g stroke="#ff4d00" stroke-width="8" stroke-linecap="round"><line x1="60" y1="15" x2="60" y2="30"/><line x1="60" y1="90" x2="60" y2="105"/><line x1="15" y1="60" x2="30" y2="60"/><line x1="90" y1="60" x2="105" y2="60"/><line x1="28" y1="28" x2="39" y2="39"/><line x1="81" y1="81" x2="92" y2="92"/><line x1="28" y1="92" x2="39" y2="81"/><line x1="81" y1="39" x2="92" y2="28"/></g></symbol>
    <symbol id="icon-cloudy" viewBox="0 0 100 100"><path d="M25,65 a20,20 0 1,1 20,-20 a25,25 0 1,1 40,5 a15,15 0 1,1 0,30 h-60 a20,20 0 1,1 0,-40" fill="#999"/></symbol>
    <symbol id="icon-rainy" viewBox="0 0 100 100"><path d="M25,65 a20,20 0 1,1 20,-20 a25,25 0 1,1 40,5 a15,15 0 1,1 0,30 h-60 a20,20 0 1,1 0,-40" fill="#666"/><path d="M45,75 L40,90 M65,75 L60,90" stroke="#00b0f0" stroke-width="6" stroke-linecap="round"/></symbol>
    <symbol id="face-0" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#00b0f0"/><circle cx="35" cy="40" r="5" fill="#fff"/><circle cx="65" cy="40" r="5" fill="#fff"/><path d="M 30 65 Q 50 85 70 65" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/></symbol>
    <symbol id="face-1" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ffff00"/><circle cx="35" cy="40" r="5" fill="#000"/><circle cx="65" cy="40" r="5" fill="#000"/><line x1="30" y1="70" x2="70" y2="70" stroke="#000" stroke-width="5" stroke-linecap="round"/></symbol>
    <symbol id="face-2" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ffff00"/><path d="M 30 45 Q 35 35 40 45 M 60 45 Q 65 35 70 45" stroke="#000" stroke-width="4" fill="none"/><path d="M 35 75 Q 50 65 65 75" stroke="#000" stroke-width="5" fill="none" stroke-linecap="round"/></symbol>
    <symbol id="face-3" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ff6600"/><line x1="25" y1="35" x2="40" y2="45" stroke="#fff" stroke-width="6"/><line x1="40" y1="35" x2="25" y2="45" stroke="#fff" stroke-width="6"/><line x1="60" y1="35" x2="75" y2="45" stroke="#fff" stroke-width="6"/><line x1="75" y1="35" x2="60" y2="45" stroke="#fff" stroke-width="6"/><path d="M 35 75 Q 50 65 65 75" stroke="#fff" stroke-width="5" fill="none"/></symbol>
    <symbol id="face-4" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ff0000"/><line x1="25" y1="35" x2="40" y2="45" stroke="#fff" stroke-width="6"/><line x1="40" y1="35" x2="25" y2="45" stroke="#fff" stroke-width="6"/><line x1="60" y1="35" x2="75" y2="45" stroke="#fff" stroke-width="6"/><line x1="75" y1="35" x2="60" y2="45" stroke="#fff" stroke-width="6"/><path d="M 30 75 Q 35 65 40 75 T 50 75 T 60 75 T 70 75" stroke="#fff" stroke-width="5" fill="none"/></symbol>
</svg>

<div class="container">
    <div id="set1" class="set-group active">
        <div class="panel"><svg class="face-svg"><use class="face-use" href="#face-0"/></svg></div>
        <div class="panel">
            <div class="label">時刻</div>
            <div><span class="clock-hm time-val">--:--</span><span class="clock-s sec-val">--</span></div>
        </div>
        <div class="panel"><svg class="face-svg"><use class="face-use" href="#face-0"/></svg></div>
        <div class="panel">
            <div class="label">時刻</div>
            <div><span class="clock-hm time-val">--:--</span><span class="clock-s sec-val">--</span></div>
        </div>
    </div>
    
    <div id="set2" class="set-group">
        <div class="panel"><div class="label">現在の天気</div><svg class="weather-svg"><use id="weather-icon" href="#icon-sunny"/></svg></div>
        <div class="panel"><div class="label">気温</div><div class="val"><span class="temp-val">--</span><span class="unit">℃</span></div></div>
        <div class="panel"><div class="label">湿度</div><div class="val"><span class="humi-val">--</span><span class="unit">%</span></div></div>
        <div class="panel"><div class="label">暑さ指数</div><svg class="face-svg" style="width:75px;height:75px;"><use class="face-use" href="#face-0"/></svg></div>
    </div>
    
    <div id="set3" class="set-group">
        <div class="pan-content">
            <div class="ticker-container">
                <div class="ticker-text" id="ticker-wrap"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const lat = params.get('lat') || '34.6937'; 
    const lon = params.get('lon') || '135.5023';
    let currentSet = 1;

    // 天気・暑さ指数情報の取得と反映
    async function updateWeather() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code`);
            const data = await res.json();
            const temp = data.current.temperature_2m;
            const humi = data.current.relative_humidity_2m;
            const code = data.current.weather_code;

            // 天気アイコン分岐
            let wIcon = "#icon-sunny";
            if (code >= 1 && code <= 3) wIcon = "#icon-cloudy";
            else if (code >= 51) wIcon = "#icon-rainy";
            document.getElementById('weather-icon').setAttribute('href', wIcon);

            // WBGT計算（PDF基準）
            const wbgt = (0.725 * temp) + (0.0368 * humi) + (0.00115 * temp * humi) - 2.503;
            let lv = 0;
            if (wbgt >= 31) lv = 4;      // 危険 [cite: 53-56]
            else if (wbgt >= 28) lv = 3; // 厳重警戒 [cite: 42-48]
            else if (wbgt >= 25) lv = 2; // 警戒 [cite: 30-33]
            else if (wbgt >= 21) lv = 1; // 注意 [cite: 19-23]

            // 多言語メッセージの定義 [cite: 9-61]
            const multi = [
                {jp:"【ほぼ安全】適宜水分補給", en:"Safe: Stay hydrated", vn:"An toàn: Bổ sung nước", cn:"基本安全：注意补水"},
                {jp:"【注意】積極的に水分補給", en:"Caution: Actively hydrate", vn:"Chú ý: Uống nước thường xuyên", cn:"注意：及时补水"},
                {jp:"【警戒】定期的に休憩", en:"Warning: Take regular breaks", vn:"Cảnh báo: Nghỉ ngơi định kỳ", cn:"警戒：定时休息"},
                {jp:"【厳重警戒】激しい作業中止", en:"Severe Warning: Stop intense work", vn:"Cảnh báo nghiêm trọng: Ngừng làm việc nặng", cn:"严重警戒：停止剧烈作业"},
                {jp:"【危険】作業を直ちに中止", en:"Danger: Stop work immediately", vn:"Nguy hiểm: Dừng công việc ngay", cn:"危险：立即停止作业"}
            ];

            // 画面要素の更新
            document.querySelectorAll('.temp-val').forEach(el => el.innerText = Math.round(temp));
            document.querySelectorAll('.humi-val').forEach(el => el.innerText = Math.round(humi));
            document.querySelectorAll('.face-use').forEach(el => el.setAttribute('href', '#face-' + lv));

            // ティッカー内容の動的生成
            const m = multi[lv];
            const faceHtml = `<svg class="ticker-face-icon"><use href="#face-${lv}"/></svg>`;
            document.getElementById('ticker-wrap').innerHTML = `${m.jp}${faceHtml}${m.en}${faceHtml}${m.vn}${faceHtml}${m.cn}${faceHtml}`;
        } catch (e) { console.error("Weather update failed:", e); }
    }

    // デジタル時計の更新
    function updateDigitalClock() {
        const now = new Date();
        const h = now.getHours().toString().padStart(2, '0');
        const m = now.getMinutes().toString().padStart(2, '0');
        const s = now.getSeconds().toString().padStart(2, '0');

        document.querySelectorAll('.clock-hm').forEach(el => el.innerText = h + ":" + m);
        document.querySelectorAll('.clock-s').forEach(el => el.innerText = s);
    }

    // ページの読み込み完了後にすべての機能を同期スタート
    window.onload = function() {
        updateDigitalClock();
        updateWeather();
        
        // 5秒おきの画面（セット）切り替え
        setInterval(() => {
            document.getElementById('set'+currentSet).classList.remove('active');
            currentSet = (currentSet % 3) + 1;
            document.getElementById('set'+currentSet).classList.add('active');
        }, 5000);

        // 1秒おきの時計更新
        setInterval(updateDigitalClock, 1000);
        
        // 5分おきの気象データ更新
        setInterval(updateWeather, 300000);
    };
</script>
</body>
</html>
